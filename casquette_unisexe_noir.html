<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Casquette unisexe noire - €10 | JL Shop 06</title>
  <meta name="description" content="Casquette unisexe noire, style élégant et confortable. En stock, livraison rapide et paiement sécurisé.">
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="page">

  <header>
    <div class="wrapper header-inner">
      <div class="brand">
        <a href="index.html" style="display:inline-block; line-height:0;">
          <img src="logo_JL_Shop_06.jpg" alt="JL Shop 06" style="height:64px; width:auto;">
        </a>
      </div>
      <a href="index.html" class="nav-cta">← Retour au stock</a>
    </div>
  </header>

  <main class="wrapper">
    <section class="section">

      <div class="hero-grid" style="gap: 32px; align-items: flex-start;">

        <div style="width:100%; max-width:400px;">
          <div class="hero-card" style="padding:0; overflow:hidden; height:360px; border-radius:18px;">
            <img src="casquette_unisexe_noir.jpg" alt="Casquette unisexe noire" style="width:100%; height:100%; object-fit:cover;">
          </div>
        </div>

        <div>
          <h1 class="hero-title" style="font-size:30px;">
            Casquette unisexe noire
          </h1>

          <div class="hero-card-price">
            €10 <span class="old">€18,99</span> <span class="pct">-47%</span>
          </div>

          <p class="hero-sub">
            Casquette confortable et élégante.
          </p>

          <div class="pill-row" style="margin:16px 0;">
            <div class="pill">📦 Stock : <strong>30 pièces</strong></div>
            <div class="pill">🚚 Livraison 3–5 jours</div>
          </div>

          <!-- BOUTON IDENTIQUE À LA FICHE QUI MARCHE -->
          <button class="btn-primary" onclick="addToCart()">
            Ajouter au panier
          </button>

        </div>
      </div>

    </section>
  </main>

  <footer>
    <div class="wrapper footer-inner">
      <span>© <span id="year"></span> JL Shop 06</span>
    </div>
  </footer>

</div>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart() {
  cart.push({
    id: "casquette-noire"
  });

  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Produit ajouté au panier !");
}

async function checkout() {
  const res = await fetch("/api/checkout", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ cart })
  });

  const data = await res.json();

  if (data.url) {
    window.location.href = data.url;
  } else {
    alert("Erreur paiement");
  }
}
</script>

</body>
</html>
