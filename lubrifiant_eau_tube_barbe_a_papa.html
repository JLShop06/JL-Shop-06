<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tube Gel Barbe à Papa – Orgie</title>
  <link rel="stylesheet" href="style.css">

  <style>
  .product-page{
      padding-top:160px;
      padding-bottom:120px;
      display:flex;
      justify-content:center;
      width:100%;
  }

  .product-container{
      max-width:1050px;
      display:flex;
      gap:80px;
      align-items:flex-start;
      padding:0 20px;
  }

  .product-image-frame{
      flex:1;
      display:flex;
      flex-direction:column;
      gap:20px;
      align-items:center;
  }

  .product-image-frame img{
      width:100%;
      max-width:450px;
      border-radius:12px;
      object-fit:cover;
      box-shadow:0 8px 40px rgba(0,0,0,0.12);
      transition:0.4s ease;
  }

  .product-image-frame img:hover{
      transform:scale(1.03);
  }

  .product-details{
      flex:1;
      max-width:450px;
      text-align:left;
  }

  .product-title{
      font-size:34px;
      font-weight:300;
      margin-bottom:10px;
  }

  .product-subtitle{
      font-size:15px;
      color:#555;
      margin-bottom:25px;
      line-height:1.6;
  }

  .product-price{
      font-size:26px;
      color:#C9A86A;
      margin-bottom:25px;
  }

  .add-to-cart{
      background:none;
      border:none;
      font-size:12px;
      letter-spacing:4px;
      padding:12px 0;
      cursor:pointer;
      opacity:0.7;
  }

  .add-to-cart:hover{
      opacity:1;
  }
  </style>

  <script>
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    function addToCart(id, name, price, priceId) {
      cart.push({ id, name, price, priceId });
      localStorage.setItem("cart", JSON.stringify(cart));
      alert("Ajouté au panier !");
    }
  </script>

</head>

<body>

<header class="lux-header">
  <div class="lux-logo">Les Jardins Enchantés</div>
</header>

<section class="product-page">
  <div class="product-container">

    <div class="product-image-frame">
      <img src="lubrifiant_eau_tube_barbe_a_papa.jpg">
      <img src="lubrifiant_eau_tube_barbe_a_papa_2.jpg">
      <img src="lubrifiant_eau_tube_barbe_a_papa_3.jpg">
    </div>

    <div class="product-details">

      <h1 class="product-title">Tube Gel Barbe à Papa – Orgie</h1>

      <p class="product-subtitle">
        Gel intime à base d’eau, aromatisé à la barbe à papa.
      </p>

      <p class="product-price">12,90 €</p>

      <!-- ✅ BOUTON CORRIGÉ -->
      <button class="add-to-cart"
        onclick="addToCart(
          'gel_barbe_a_papa',
          'Gel Barbe à Papa',
          12.90,
          'price_1TWbqXF9c1lWA0Hy5Ay6RsHx'
        )">
        AJOUTER AU PANIER
      </button>

    </div>

  </div>
</section>

</body>
</html>
