  <link rel="stylesheet" href="style.css">
  <script src="https://js.stripe.com/v3/"></script>

  <script>
    const BACKEND_URL = 'https://jl-shop-backend.TON_NOM.workers.dev';
    const STRIPE_PUBLIC_KEY = 'pk_live_51Q034cF9c1lWA0Hy7EnayZDKTYJUiKnm0vPcOy8mkUGDmq1OjBennoOi7ZKVSmPekJXpvkzB7hZ9Kuwfq4haMEYS004gwlFkJu';

    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    const stripe = Stripe(STRIPE_PUBLIC_KEY);

    function updateCartCount() {
      const count = cart.reduce((sum, item) => sum + item.quantity, 0);
      document.getElementById('stripe-checkout-btn').innerText = `🛒 Panier (${count})`;
      localStorage.setItem('cart', JSON.stringify(cart));
    }

    function addToCart(id, name, price, priceId) {
      const existing = cart.find(i => i.id === id);
      if (existing) existing.quantity++;
      else cart.push({ id, name, price, priceId, quantity: 1 });
      updateCartCount();
    }

    function showCart() {
      let total = 0;
      let msg = "PANIER\n\n";
      cart.forEach(i => {
        total += i.price * i.quantity;
        msg += `${i.name} x${i.quantity}\n`;
      });
      msg += `\nTOTAL: €${total}`;
      alert(msg);
    }

    document.addEventListener('DOMContentLoaded', updateCartCount);
  </script>
