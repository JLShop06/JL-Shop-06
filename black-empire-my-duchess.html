<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Empire – My Duchess Vibromasseur Rabbit</title>
    <link rel="stylesheet" href="style.css">

    <style>
    .product-page{
        padding-top:160px;
        padding-bottom:120px;
        display:flex;
        justify-content:center;
        width:100%;
    }

    .product-container{
        max-width:1050px;
        display:flex;
        gap:80px;
        align-items:flex-start;
        padding:0 20px;
    }

    /* IMAGES */
    .product-image-frame{
        flex:1;
        display:flex;
        flex-direction:column;
        gap:20px;
        align-items:center;
    }

    .product-image-frame img{
        width:100%;
        max-width:450px;
        border-radius:12px;
        object-fit:cover;
        box-shadow:0 8px 40px rgba(0,0,0,0.12);
        transition:0.4s ease;
    }

    .product-image-frame img:hover{
        transform:scale(1.03);
    }

    /* TEXTE */
    .product-details{
        flex:1;
        max-width:450px;
        text-align:left;
    }

    .product-title{
        font-size:34px;
        font-weight:300;
        margin-bottom:10px;
    }

    .product-subtitle{
        font-size:15px;
        color:#555;
        margin-bottom:25px;
        line-height:1.6;
    }

    .product-price{
        font-size:26px;
        color:#C9A86A;
        margin-bottom:25px;
        font-weight:300;
    }

    .add-to-cart{
        background:none;
        border:none;
        font-size:12px;
        letter-spacing:4px;
        padding:12px 0;
        cursor:pointer;
        opacity:0.7;
    }

    .add-to-cart:hover{
        opacity:1;
    }

    .separator{
        margin:40px 0;
        border:none;
        border-top:1px solid rgba(0,0,0,0.08);
    }

    .section-title{
        font-size:18px;
        margin-bottom:15px;
        font-weight:300;
    }

    .product-description{
        font-size:15px;
        color:#444;
        margin-bottom:20px;
        line-height:1.8;
    }
